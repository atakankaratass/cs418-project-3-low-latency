<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS 418 QR timestamp overlay</title>
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      #wrap {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: white;
        font-family: system-ui, sans-serif;
        border-radius: 8px;
      }
      #qr {
        width: 132px;
        height: 132px;
        background: white;
      }
      #label {
        font-size: 18px;
        line-height: 1.25;
        text-shadow: 0 1px 2px black;
      }
      #payload {
        font-size: 12px;
        opacity: 0.85;
        max-width: 300px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div id="wrap" aria-label="QR timestamp overlay">
      <canvas id="qr" width="132" height="132"></canvas>
      <div>
        <div id="label">QR timestamp overlay</div>
      </div>
    </div>
    <script src="/qrcode.bundle"></script>
    <script>
      const prefix = "cs418-project3-ts=";
      const canvas = document.getElementById("qr");

      function updateQr() {
        const payload = prefix + new Date().toISOString();
        const qr = qrcode(0, "M");
        qr.addData(payload);
        qr.make();

        const context = canvas.getContext("2d");
        const moduleCount = qr.getModuleCount();
        const margin = 4;
        const cellSize = Math.floor((canvas.width - margin * 2) / moduleCount);
        const qrSize = cellSize * moduleCount;
        const offset = Math.floor((canvas.width - qrSize) / 2);

        context.fillStyle = "#fff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = "#000";

        for (let row = 0; row < moduleCount; row += 1) {
          for (let col = 0; col < moduleCount; col += 1) {
            if (qr.isDark(row, col)) {
              context.fillRect(
                offset + col * cellSize,
                offset + row * cellSize,
                cellSize,
                cellSize,
              );
            }
          }
        }
      }

      updateQr();
      setInterval(updateQr, 500);
    </script>
  </body>
</html>
