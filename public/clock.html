<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      background: transparent;
      color: lime;
      font: bold 48px monospace;
      margin: 20px;
      text-shadow: 2px 2px 4px #000;
    "
  >
    <script>
      function pad(n) {
        return String(n).padStart(2, "0");
      }
      function tick() {
        var d = new Date();
        document.body.textContent =
          pad(d.getHours()) +
          ":" +
          pad(d.getMinutes()) +
          ":" +
          pad(d.getSeconds()) +
          "." +
          String(d.getMilliseconds()).padStart(3, "0");
      }
      tick();
      setInterval(tick, 50);
    </script>
  </body>
</html>
